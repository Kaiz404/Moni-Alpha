<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Notification Model Test</title>
  <style>body{font-family:system-ui,Segoe UI,Arial;padding:20px}button{padding:8px 12px}</style>
</head>
<body>
  <h1>Notification Model Test (Mocked)</h1>
  <p>This page runs a simple set of notifications through a mocked "model" and the prefilter.
  For every notification that the mocked model marks as a transaction, a mock tool is invoked
  (console.log("mock-tool-called", payload)).</p>

  <button id="run">Run Test</button>
  <pre id="out"></pre>

  <script>
    // Minimal copy of the prefilter patterns used in the app
    const MONEY_PATTERN = /(?:[$€£¥₦₹₩₪₱฿₫₲₴₵₸₽₾R])\s*[\d,]+(?:[.,]\d{1,2})?|[\d,]+(?:[.,]\d{1,2})?\s*(?:USD|EUR|GBP|NGN|ZAR|KES|GHS|UGX|TZS|MYR|SGD|AUD|CAD|CHF|JPY|CNY|INR|BRL|MXN|AED|SAR|QAR|KWD|OMR|BHD)\b/i;
    const TRANSFER_SIGNAL_PATTERN = /\b(credited|debited|received|sent|paid|payment|purchase|spent|withdrawn|withdrawal|deposit|transferred|transfer|refund|dr\b|cr\b|from\s+|to\s+|at\s+|via\s+|merchant|beneficiary|sender|receiver)\b/i;

    function notificationText(n){
      return [n.title,n.titleBig,n.text,n.bigText,n.subText,n.summaryText,n.extraInfoText].filter(Boolean).join(' ');
    }

    function prefilter(n){
      const text = notificationText(n);
      return MONEY_PATTERN.test(text) && TRANSFER_SIGNAL_PATTERN.test(text);
    }

    // Mocked model decision function — simulates structured JSON output
    function mockModelDecision(n){
      const text = notificationText(n).toLowerCase();
      if (text.includes('credit') || text.includes('credited') || text.includes('paid') || text.includes('you paid')){
        // simulate confident transaction
        return {
          is_transaction: true,
          reasoning: 'Mock: contains transaction keywords',
          confidence: 0.92,
          amount: 123.45,
          currency: 'USD',
          type: text.includes('credit') || text.includes('credited') ? 'income' : 'expense',
          merchant: text.includes('to') ? 'MockMerchant' : null,
          description: null,
          wallet_hint: 'Mock Wallet',
          category_hint: null,
          transaction_date: new Date().toISOString(),
        };
      }
      return { is_transaction: false, reasoning: 'Mock: not a transaction' };
    }

    // Mock tool — invoked when model approves a transaction
    function mockTool(proposal){
      console.log('mock-tool-called', proposal);
    }

    const samples = [
      { id: '1', app: 'Kuda Bank', title: 'Credit Alert', text: 'Your account has been credited with $50 from John.' },
      { id: '2', app: 'Gmail', title: 'Promo', text: 'Get 20% off this week!' },
      { id: '3', app: 'Opay', title: 'Debit', text: 'You paid ₦2000 to MegaStore. Available balance updated.' },
      { id: '4', app: 'Bank', title: 'OTP', text: 'Your OTP is 123456. Do not share.' },
    ];

    document.getElementById('run').addEventListener('click', () => {
      const out = [];
      let passed = 0;
      for (const n of samples){
        const pre = prefilter(n);
        out.push(`${n.id}: prefilter=${pre} text=${notificationText(n)}`);
        if (!pre) continue;
        const model = mockModelDecision(n);
        out.push(`${n.id}: model → ${JSON.stringify(model)}`);
        if (model.is_transaction){
          passed++;
          mockTool({ notification: n, modelOutput: model });
        }
      }
      out.push('Total passing (mock model): ' + passed);
      document.getElementById('out').textContent = out.join('\n');
    });
  </script>
</body>
</html>
